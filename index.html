<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elijah Che Williams — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'OutOfAfrica';
    src:url('OutOfAfrica.ttf') format('truetype');
  }

  :root{
    --red:#e0121f;
    --gold-soft:#eed79a;
    --cream:#f3e6c8;
    --ink:#1c1310;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }

  body{
    background:var(--red);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }

  h1,h2,h3{ font-family:'OutOfAfrica', sans-serif; font-weight:400; letter-spacing:0.03em; }
  a{ color:inherit; text-decoration:none; }

  /* ===== NAV ===== */
  .navbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:1.4rem 2.5rem;
    border-bottom:1px solid rgba(255,255,255,0.12);
    position:relative; z-index:20;
  }
  .navbar .brand{
    font-family:'OutOfAfrica', sans-serif;
    font-size:1rem; letter-spacing:0.15em; text-transform:uppercase;
  }
  .navbar nav{ display:flex; gap:2.2rem; }
  .navbar nav a{
    font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase;
    opacity:0.85; transition:opacity 0.2s;
  }
  .navbar nav a:hover{ opacity:1; text-decoration:underline; }

  /* ===== VIEW SWITCH ===== */
  .view{ display:none; }
  .view.active{ display:block; }

  /* ===== SCATTER CONTAINER ===== */
  /* Using CSS columns for a natural, uneven masonry scatter */
  .scatter-wrap{
    padding:4rem 3rem 8rem;
    column-count:3;
    column-gap:3rem;
    max-width:1600px;
    margin:0 auto;
  }

  /* Each item breaks column flow naturally */
  .scatter-item{
    break-inside:avoid;
    display:block;
    position:relative;
    margin-bottom:var(--gap);
    opacity:0;
    transform:rotate(var(--tilt)) translateY(20px);
    transition:opacity 0.6s ease, transform 0.6s ease, box-shadow 0.25s ease;
    cursor:pointer;
  }
  .scatter-item.in-view{
    opacity:1;
    transform:rotate(var(--tilt)) translateY(0);
  }
  .scatter-item:hover{
    z-index:10;
    transform:rotate(calc(var(--tilt)*0.2)) translateY(-6px) scale(1.02) !important;
  }

  /* ===== PHOTO CARD (polaroid border) ===== */
  .photo-card{
    background:#f8f4ee;
    padding:8px 8px 40px;
    box-shadow:
      0 3px 6px rgba(0,0,0,0.22),
      0 12px 30px rgba(0,0,0,0.35);
    position:relative;
  }
  .photo-card img{
    width:100%; display:block;
    object-fit:cover;
  }
  /* Vignette */
  .photo-card::after{
    content:'';
    position:absolute;
    top:8px; left:8px; right:8px;
    bottom:40px;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.25) 100%);
    pointer-events:none; z-index:2;
  }
  /* Caption on hover */
  .photo-caption{
    position:absolute; bottom:0; left:8px; right:8px;
    height:40px;
    display:flex; align-items:center; justify-content:center;
    font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase;
    color:#6b5d4f; background:#f8f4ee;
    opacity:0; transition:opacity 0.2s;
  }
  .scatter-item:hover .photo-caption{ opacity:1; }

  /* ===== TAPE PNGs — on photos only ===== */
  .tape{
    position:absolute;
    width:100px;
    z-index:10;
    pointer-events:none;
    mix-blend-mode:multiply;
    opacity:0.85;
  }
  /* Opposite corner pairs — each photo gets tl+br or tr+bl */
  .tape.tl{ top:-13px; left:-18px; }
  .tape.tr{ top:-13px; right:-18px; transform:scaleX(-1); }
  .tape.bl{ bottom:-13px; left:-18px; transform:scaleY(-1); }
  .tape.br{ bottom:-13px; right:-18px; transform:scale(-1); }

  /* ===== VIDEO CARD (no tape, no border, raw) ===== */
  .video-card{
    position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    overflow:hidden;
  }
  .video-card video{
    width:100%; display:block;
    object-fit:cover;
  }
  .video-label{
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    padding:1rem 0.8rem 0.5rem;
    font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--gold-soft); opacity:0; transition:opacity 0.2s;
  }
  .scatter-item:hover .video-label{ opacity:1; }

  /* ===== OVERVIEW ===== */
  .overview-header{
    max-width:1100px; margin:0 auto;
    padding:3rem 1.5rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:1rem;
  }
  .back-btn{
    background:none;
    border:1px solid var(--gold-soft); color:var(--gold-soft);
    font-family:'Work Sans', sans-serif;
    font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase;
    padding:0.6rem 1.2rem; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .back-btn:hover{ background:var(--gold-soft); color:var(--ink); }
  .overview-header h2{ font-size:clamp(1.8rem,4vw,2.6rem); margin:0; }

  .photo-grid{
    max-width:1100px; margin:0 auto;
    padding:1rem 1.5rem 6rem;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:1.6rem;
  }
  .grid-photo{
    background:#f8f4ee; padding:6px;
    box-shadow:0 6px 18px rgba(0,0,0,0.3);
    cursor:pointer;
    transition:transform 0.3s, box-shadow 0.3s;
    position:relative;
  }
  .grid-photo:hover{ transform:scale(1.03); box-shadow:0 10px 28px rgba(0,0,0,0.42); }
  .grid-photo img{
    width:100%; height:240px; object-fit:cover; display:block;
    transition:transform 0.4s;
  }
  .grid-photo:hover img{ transform:scale(1.06); }
  .grid-label{
    position:absolute; bottom:0; left:0; right:0;
    padding:1rem 0.7rem 0.4rem;
    background:linear-gradient(to top,rgba(28,19,16,0.85),transparent);
    font-size:0.78rem; color:var(--cream);
  }

  /* ===== LIGHTBOX ===== */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(8,4,2,0.95);
    display:none; align-items:center; justify-content:center;
    z-index:200; padding:2rem;
  }
  .lightbox.active{ display:flex; }
  .lightbox-inner{
    max-width:780px; width:100%; text-align:center;
    background:#f8f4ee; padding:10px 10px 42px;
    box-shadow:0 22px 65px rgba(0,0,0,0.65);
  }
  .lb-img{ width:100%; max-height:74vh; object-fit:contain; display:block; }
  .lb-title{
    margin-top:0.6rem;
    font-size:0.68rem; letter-spacing:0.16em; text-transform:uppercase;
    color:#6b5d4f; font-family:'Work Sans', sans-serif;
  }
  .lb-close{
    position:fixed; top:2rem; right:2rem;
    background:none; border:1px solid var(--gold-soft); color:var(--gold-soft);
    width:42px; height:42px; border-radius:50%; font-size:1.2rem; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .lb-close:hover{ background:var(--gold-soft); color:var(--ink); }

  @media(max-width:900px){
    .scatter-wrap{ column-count:2; padding:3rem 1.5rem 6rem; }
  }
  @media(max-width:560px){
    .scatter-wrap{ column-count:1; }
    .navbar{ flex-direction:column; gap:1rem; align-items:flex-start; }
    .navbar nav{ gap:1.2rem; flex-wrap:wrap; }
  }
  @media(prefers-reduced-motion:reduce){
    .scatter-item{ transition:none; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div class="view active" id="view-home">
  <header class="navbar">
    <div class="brand">Elijah Che Williams</div>
    <nav>
      <a href="#">Images</a>
      <a href="#">Moving Images</a>
      <a href="#">A Deeper Look</a>
    </nav>
  </header>
  <div class="scatter-wrap" id="scatter-wrap"></div>
</div>

<!-- OVERVIEW (single photo clicked) -->
<div class="view" id="view-overview">
  <div class="overview-header">
    <button class="back-btn" id="back-btn">← Back</button>
    <h2 id="overview-title"></h2>
  </div>
  <div class="photo-grid" id="photo-grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <div class="lightbox-inner">
    <img class="lb-img" id="lb-img" src="" alt="">
    <p class="lb-title" id="lb-title"></p>
  </div>
</div>

<script>
  const TA = 'tape-png-44308.png';
  const TB = 'tape-png-44311.png';

  /* Every single photo and video — all go on the main page */
  const allItems = [
    // ---- PHOTOS (get 2 tapes, polaroid border) ----
    {
      type:'photo', file:'IMG_7441.jpeg', title:'Stillness',
      tilt:'-3.2deg', gap:'3.5rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_8381.jpeg', title:'Blue',
      tilt:'2.1deg', gap:'5rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_8555.jpeg', title:'Dusk Prayer',
      tilt:'-1.4deg', gap:'2.8rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_5498.jpeg', title:'Bond',
      tilt:'2.8deg', gap:'4.2rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_4776.jpeg', title:'Sisters',
      tilt:'-2.5deg', gap:'3.1rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_8762.jpeg', title:'Yellow',
      tilt:'1.7deg', gap:'5.5rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_7006.jpeg', title:'Flower',
      tilt:'-3.8deg', gap:'2.5rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_7617.jpeg', title:'Purple House',
      tilt:'1.2deg', gap:'6rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_0020.jpeg', title:'Open',
      tilt:'-1.9deg', gap:'3.8rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_9195.jpeg', title:'The Wall',
      tilt:'3.1deg', gap:'4.8rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_7069.jpeg', title:'Night Wall',
      tilt:'-2.2deg', gap:'2.2rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'IMG_6595.jpeg', title:'Yellow Dress',
      tilt:'2.4deg', gap:'5.2rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    {
      type:'photo', file:'IMG_9233.jpeg', title:'Bedroom',
      tilt:'-4.1deg', gap:'3.3rem',
      t1:TA, t1p:'tl', t2:TB, t2p:'br',
    },
    {
      type:'photo', file:'Screenshot_2026-07-05_103457.png', title:'Laughter',
      tilt:'1.6deg', gap:'4.5rem',
      t1:TB, t1p:'tr', t2:TA, t2p:'bl',
    },
    // ---- VIDEOS (no tape, no border, raw) ----
    {
      type:'video', file:'HAIR.MP4', title:'Hair',
      tilt:'-2.6deg', gap:'3.6rem',
    },
    {
      type:'video', file:'GAP_3.mp4', title:'Gap',
      tilt:'1.9deg', gap:'5.8rem',
    },
    {
      type:'video', file:'BAM.mp4', title:'Bam',
      tilt:'-1.1deg', gap:'2.9rem',
    },
  ];

  /* Shuffle so photos and videos are mixed, not grouped */
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }
  const items = shuffle([...allItems]);

  const scatterWrap  = document.getElementById('scatter-wrap');
  const viewHome     = document.getElementById('view-home');
  const viewOverview = document.getElementById('view-overview');
  const overviewTitle= document.getElementById('overview-title');
  const photoGrid    = document.getElementById('photo-grid');
  const backBtn      = document.getElementById('back-btn');
  const lightbox     = document.getElementById('lightbox');
  const lbImg        = document.getElementById('lb-img');
  const lbTitle      = document.getElementById('lb-title');
  const lbClose      = document.getElementById('lb-close');

  items.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'scatter-item';
    wrap.style.setProperty('--tilt', item.tilt);
    wrap.style.setProperty('--gap', item.gap);

    if(item.type === 'photo'){
      wrap.innerHTML = `
        <div class="photo-card">
          <img src="${item.file}" alt="${item.title}" loading="lazy">
          <img class="tape ${item.t1p}" src="${item.t1}" alt="">
          <img class="tape ${item.t2p}" src="${item.t2}" alt="">
          <div class="photo-caption">${item.title}</div>
        </div>
      `;
      wrap.addEventListener('click', () => openPhoto(item));
    } else {
      wrap.innerHTML = `
        <div class="video-card">
          <video src="${item.file}" muted loop playsinline preload="metadata"
            onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0">
          </video>
          <div class="video-label">${item.title}</div>
        </div>
      `;
    }

    scatterWrap.appendChild(wrap);
  });

  /* Scroll reveal */
  const els = document.querySelectorAll('.scatter-item');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in-view'); });
  },{threshold:0.08});
  els.forEach((el,i)=>setTimeout(()=>obs.observe(el), i*55));

  /* Clicking a photo shows it full-size in lightbox directly */
  function openPhoto(item){
    lbImg.src   = item.file;
    lbImg.alt   = item.title;
    lbTitle.textContent = item.title;
    lightbox.classList.add('active');
  }

  backBtn.addEventListener('click',()=>{
    viewOverview.classList.remove('active');
    viewHome.classList.add('active');
    window.scrollTo({top:0,behavior:'instant'});
  });

  lbClose.addEventListener('click',()=>lightbox.classList.remove('active'));
  lightbox.addEventListener('click',e=>{
    if(e.target===lightbox) lightbox.classList.remove('active');
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') lightbox.classList.remove('active');
  });
</script>
</body>
</html>
