<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elijah Che Williams — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'OutOfAfrica';
    src:url('OutOfAfrica.ttf') format('truetype');
  }

  :root{
    --red:#e0121f;
    --gold-soft:#eed79a;
    --cream:#f3e6c8;
    --ink:#1c1310;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }

  body{
    background:var(--red);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    overflow-x:hidden;
  }

  h1,h2,h3{ font-family:'OutOfAfrica', sans-serif; font-weight:400; letter-spacing:0.03em; }
  a{ color:inherit; text-decoration:none; }

  /* ===== NAV ===== */
  .navbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:1.2rem 2.5rem;
    border-bottom:1px solid rgba(255,255,255,0.12);
    position:fixed; top:0; left:0; right:0;
    z-index:100;
    background:var(--red);
  }
  .navbar .brand{
    font-family:'OutOfAfrica', sans-serif;
    font-size:0.9rem; letter-spacing:0.15em; text-transform:uppercase;
  }
  .navbar nav{ display:flex; gap:2rem; }
  .navbar nav a{
    font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase;
    opacity:0.85; transition:opacity 0.2s;
  }
  .navbar nav a:hover{ opacity:1; text-decoration:underline; }

  /* ===== VIEW SWITCH ===== */
  .view{ display:none; }
  .view.active{ display:block; }

  /* ===== SCATTER STAGE — absolute positioned ===== */
  .stage{
    position:relative;
    width:100%;
    /* height set by JS based on tallest item */
    margin-top:56px; /* navbar height */
  }

  /* Every scatter item */
  .scatter-item{
    position:absolute;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.7s ease, transform 0.25s ease, box-shadow 0.25s ease;
  }
  .scatter-item.visible{ opacity:1; }

  /* ===== PHOTO card (polaroid) ===== */
  .photo-card{
    background:#f8f4ee;
    padding:7px 7px 38px;
    box-shadow:
      0 3px 8px rgba(0,0,0,0.25),
      0 14px 35px rgba(0,0,0,0.38);
    position:relative;
    transform:rotate(var(--tilt));
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .photo-card:hover{
    transform:rotate(calc(var(--tilt)*0.15)) scale(1.03) translateY(-6px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3), 0 26px 52px rgba(0,0,0,0.45);
    z-index:50;
  }
  .photo-card img{
    display:block; width:100%; height:100%;
    object-fit:cover;
  }
  /* vignette */
  .photo-card .face{
    position:relative; overflow:hidden;
  }
  .photo-card .face::after{
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.22) 100%);
    pointer-events:none; z-index:2;
  }
  /* polaroid caption strip */
  .photo-caption{
    position:absolute; bottom:0; left:7px; right:7px;
    height:38px;
    display:flex; align-items:center; justify-content:center;
    font-size:0.58rem; letter-spacing:0.13em; text-transform:uppercase;
    color:#6b5d4f; background:#f8f4ee;
    opacity:0; transition:opacity 0.2s;
  }
  .photo-card:hover .photo-caption{ opacity:1; }

  /* ===== TAPE PNGs ===== */
  .tape{
    position:absolute;
    width:100px;
    z-index:20;
    pointer-events:none;
    mix-blend-mode:multiply;
    opacity:0.82;
  }
  .tape.tl{ top:-13px; left:-18px; }
  .tape.tr{ top:-13px; right:-18px; transform:scaleX(-1); }
  .tape.bl{ bottom:-13px; left:-18px; transform:scaleY(-1); }
  .tape.br{ bottom:-13px; right:-18px; transform:scale(-1); }

  /* ===== VIDEO card (no tape, no border) ===== */
  .video-card{
    position:relative;
    box-shadow:0 8px 28px rgba(0,0,0,0.5);
    overflow:hidden;
    transform:rotate(var(--tilt));
    transition:transform 0.25s ease;
  }
  .video-card:hover{
    transform:rotate(calc(var(--tilt)*0.15)) scale(1.02) translateY(-4px);
    z-index:50;
  }
  .video-card video{
    display:block; width:100%;
    object-fit:cover; background:#000;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(8,4,2,0.95);
    display:none; align-items:center; justify-content:center;
    z-index:300; padding:2rem;
  }
  .lightbox.active{ display:flex; }
  .lb-inner{
    max-width:820px; width:100%; text-align:center;
    background:#f8f4ee; padding:10px 10px 42px;
    box-shadow:0 24px 70px rgba(0,0,0,0.7);
    position:relative;
  }
  .lb-inner img{
    width:100%; max-height:76vh; object-fit:contain; display:block;
  }
  .lb-title{
    margin-top:0.6rem;
    font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase;
    color:#6b5d4f; font-family:'Work Sans', sans-serif;
  }
  .lb-close{
    position:fixed; top:1.8rem; right:1.8rem;
    background:none; border:1px solid var(--gold-soft); color:var(--gold-soft);
    width:42px; height:42px; border-radius:50%; font-size:1.2rem; cursor:pointer;
    transition:background 0.2s, color 0.2s;
  }
  .lb-close:hover{ background:var(--gold-soft); color:var(--ink); }

  @media(max-width:768px){
    .navbar nav{ gap:1rem; }
    .scatter-item{ position:relative !important; top:auto !important; left:auto !important;
      width:85vw !important; margin:2rem auto !important; display:block; }
    .stage{ height:auto !important; display:flex; flex-direction:column; align-items:center; padding-bottom:4rem; }
    .photo-card, .video-card{ transform:none !important; width:100% !important; }
    .photo-card img, .video-card video{ height:260px !important; }
  }
  @media(prefers-reduced-motion:reduce){
    .scatter-item, .photo-card, .video-card{ transition:none; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div class="view active" id="view-home">
  <header class="navbar">
    <div class="brand">Elijah Che Williams</div>
    <nav>
      <a href="#">Images</a>
      <a href="#">Moving Images</a>
      <a href="#">A Deeper Look</a>
    </nav>
  </header>
  <div class="stage" id="stage"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <div class="lb-inner">
    <img id="lb-img" src="" alt="">
    <p class="lb-title" id="lb-title"></p>
  </div>
</div>

<script>
  const TA = 'tape-png-44308.png';
  const TB = 'tape-png-44311.png';

  /* Each item has:
     type: photo | video
     file: filename
     title: caption
     w: width in px
     h: height of the image/video face
     lp: left % of stage
     tp: top px from stage top
     tilt: rotation
     t1/t1p and t2/t2p: tape png + corner (photos only) */
  const items = [
    // ── ROW 1 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_7441.jpeg', title:'Stillness',
      w:270, h:400, lp:3, tp:60,
      tilt:'-3deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    {
      type:'video', file:'HAIR.MP4', title:'Hair',
      w:460, h:270, lp:27, tp:30,
      tilt:'1deg'
    },
    {
      type:'photo', file:'IMG_8381.jpeg', title:'Blue',
      w:255, h:390, lp:72, tp:50,
      tilt:'2.2deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    // ── ROW 2 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_4776.jpeg', title:'Sisters',
      w:370, h:248, lp:6, tp:540,
      tilt:'-1.8deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    {
      type:'photo', file:'IMG_8555.jpeg', title:'Dusk Prayer',
      w:360, h:240, lp:40, tp:480,
      tilt:'2.5deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    {
      type:'photo', file:'IMG_9195.jpeg', title:'The Wall',
      w:235, h:355, lp:73, tp:510,
      tilt:'-2.8deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    // ── ROW 3 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_5498.jpeg', title:'Bond',
      w:255, h:385, lp:4, tp:950,
      tilt:'3deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    {
      type:'video', file:'Gap 3.mp4', title:'Gap',
      w:445, h:260, lp:27, tp:880,
      tilt:'-1.5deg'
    },
    {
      type:'photo', file:'IMG_7617.jpeg', title:'Purple House',
      w:250, h:380, lp:72, tp:920,
      tilt:'1.8deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    // ── ROW 4 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_7069.jpeg', title:'Night Wall',
      w:375, h:252, lp:5, tp:1400,
      tilt:'-2.3deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    {
      type:'photo', file:'IMG_7006.jpeg', title:'Flower',
      w:355, h:238, lp:35, tp:1340,
      tilt:'1.6deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    {
      type:'photo', file:'IMG_0020.jpeg', title:'Open',
      w:365, h:245, lp:65, tp:1380,
      tilt:'-1.2deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    // ── ROW 5 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_6595.jpeg', title:'Yellow Dress',
      w:252, h:378, lp:4, tp:1760,
      tilt:'2.7deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    {
      type:'video', file:'Bam.mp4', title:'Bam',
      w:440, h:258, lp:27, tp:1700,
      tilt:'1.2deg'
    },
    {
      type:'photo', file:'IMG_8762.jpeg', title:'Yellow',
      w:248, h:372, lp:72, tp:1730,
      tilt:'-3.2deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
    // ── ROW 6 ──────────────────────────────────────────
    {
      type:'photo', file:'IMG_9233.jpeg', title:'Bedroom',
      w:370, h:250, lp:6, tp:2210,
      tilt:'-2deg', t1:TA, t1p:'tl', t2:TB, t2p:'br'
    },
    {
      type:'photo', file:'Screenshot 2026-07-05 103457.png', title:'Laughter',
      w:358, h:258, lp:45, tp:2160,
      tilt:'1.4deg', t1:TB, t1p:'tr', t2:TA, t2p:'bl'
    },
  ];

  const stage = document.getElementById('stage');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbTitle = document.getElementById('lb-title');
  const lbClose = document.getElementById('lb-close');

  /* Build stage items */
  items.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'scatter-item';
    wrap.style.left = item.lp + '%';
    wrap.style.top  = item.tp + 'px';
    wrap.style.width = item.w + 'px';

    if(item.type === 'photo'){
      wrap.innerHTML = `
        <div class="photo-card" style="--tilt:${item.tilt}">
          <div class="face" style="width:${item.w}px;height:${item.h}px">
            <img src="${item.file}" alt="${item.title}" loading="lazy" style="width:${item.w}px;height:${item.h}px">
          </div>
          <img class="tape ${item.t1p}" src="${item.t1}" alt="">
          <img class="tape ${item.t2p}" src="${item.t2}" alt="">
          <div class="photo-caption">${item.title}</div>
        </div>
      `;
      wrap.addEventListener('click', ()=>{
        lbImg.src = item.file;
        lbImg.alt = item.title;
        lbTitle.textContent = item.title;
        lightbox.classList.add('active');
      });
    } else {
      wrap.innerHTML = `
        <div class="video-card" style="--tilt:${item.tilt}; width:${item.w}px">
          <video src="${item.file}" style="height:${item.h}px"
            muted loop playsinline preload="metadata"
            onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0">
          </video>
        </div>
      `;
    }

    stage.appendChild(wrap);
  });

  /* Set stage height to fit all content */
  function setStageHeight(){
    let maxBottom = 0;
    document.querySelectorAll('.scatter-item').forEach(el => {
      const top = parseInt(el.style.top);
      const h = el.offsetHeight;
      if(top + h > maxBottom) maxBottom = top + h;
    });
    stage.style.height = (maxBottom + 160) + 'px';
  }

  /* Staggered reveal on load */
  window.addEventListener('load', ()=>{
    setStageHeight();
    const els = document.querySelectorAll('.scatter-item');
    els.forEach((el, i)=>{
      setTimeout(()=> el.classList.add('visible'), i * 80);
    });
  });

  /* Lightbox close */
  lbClose.addEventListener('click', ()=> lightbox.classList.remove('active'));
  lightbox.addEventListener('click', e=>{ if(e.target===lightbox) lightbox.classList.remove('active'); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') lightbox.classList.remove('active'); });
</script>
</body>
</html>
