<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame & Found — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family: 'OutOfAfrica';
    src: url('OutOfAfrica.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  :root{
    --red: #e0121f;
    --gold-soft: #eed79a;
    --cream: #f3e6c8;
    --ink: #1c1310;
    --tape: rgba(220,210,195,0.55);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    background: var(--red);
    color: var(--cream);
    font-family:'Work Sans', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }

  h1,h2,h3,.display{
    font-family:'OutOfAfrica', sans-serif;
    font-weight:400;
    letter-spacing:0.04em;
  }

  a{ color:inherit; text-decoration:none; }

  /* ===== NAV ===== */
  .navbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 1.4rem 2.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .navbar .brand{
    font-family:'OutOfAfrica', sans-serif;
    font-size:1rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
  }
  .navbar nav{
    display:flex;
    gap: 2.2rem;
  }
  .navbar nav a{
    font-size:0.78rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    opacity:0.9;
    transition: opacity 0.2s;
  }
  .navbar nav a:hover{ opacity:1; text-decoration:underline; }

  /* ===== VIEW SWITCHING ===== */
  .view{ display:none; }
  .view.active{ display:block; }

  /* ===== SCATTER GRID (home) ===== */
  .scatter-wrap{
    max-width: 1700px;
    margin: 0 auto;
    padding: 4rem 2.5rem 7rem;
    position:relative;
  }

  .scatter-grid{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-start;
    justify-content:center;
    gap: 3rem 4rem;
  }

  .scatter-item{
    position:relative;
    cursor:pointer;
    opacity:0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .scatter-item.in-view{ opacity:1; transform: translateY(0); }

  .scatter-item .media{
    width:100%;
    height:100%;
    display:block;
    background: linear-gradient(145deg, #3a3a3a, #1d1d1d 45%, #565656 75%);
    filter: sepia(0.15) contrast(1.05);
  }

  /* size variants -- mimics varied photo dimensions in the reference */
  .size-sm{ width: 260px; height: 460px; margin-top: 0; }
  .size-md{ width: 360px; height: 240px; margin-top: 6rem; }
  .size-lg{ width: 480px; height: 480px; margin-top: -2rem; }
  .size-tall{ width: 300px; height: 560px; margin-top: 2rem; }
  .size-wide{ width: 420px; height: 280px; margin-top: 9rem; }

  .scatter-item .frame-icon{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size: 3rem;
    opacity:0.55;
  }

  .scatter-item .title-tag{
    position:absolute;
    bottom: -1.6rem;
    left: 0;
    font-size:0.75rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--gold-soft);
    opacity:0;
    transition: opacity 0.25s ease;
    white-space:nowrap;
  }
  .scatter-item:hover .title-tag{ opacity:1; }

  /* video-style placeholder tile */
  .scatter-item.is-video .media{
    display:flex; align-items:center; justify-content:center;
  }
  .play-btn{
    width:64px; height:64px;
    border-radius:50%;
    background: rgba(0,0,0,0.45);
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem;
    border: 1px solid rgba(255,255,255,0.6);
  }

  /* tape strips -- positioned at varied corners/edges per item */
  .tape{
    position:absolute;
    width: 90px; height: 30px;
    background: var(--tape);
    box-shadow: 0 2px 5px rgba(0,0,0,0.25);
    z-index:3;
  }
  .tape.pos-tl{ top:-14px; left:-16px; transform: rotate(-42deg); }
  .tape.pos-tr{ top:-14px; right:-16px; transform: rotate(42deg); }
  .tape.pos-bl{ bottom:-14px; left:-16px; transform: rotate(42deg); }
  .tape.pos-br{ bottom:-14px; right:-16px; transform: rotate(-42deg); }
  .tape.pos-midleft{ top:50%; left:-18px; transform: translateY(-50%) rotate(90deg); }
  .tape.pos-midright{ top:50%; right:-18px; transform: translateY(-50%) rotate(90deg); }

  /* ===== OVERVIEW (series detail) ===== */
  .overview-header{
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 1.5rem 1.5rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:1rem;
  }
  .back-btn{
    background:none;
    border: 1px solid var(--gold-soft);
    color: var(--gold-soft);
    font-family:'Work Sans', sans-serif;
    font-size:0.8rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding: 0.6rem 1.2rem;
    cursor:pointer;
    transition: background 0.2s, color 0.2s;
  }
  .back-btn:hover{ background: var(--gold-soft); color: var(--ink); }
  .overview-header h2{
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    margin:0;
  }

  .photo-grid{
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem 1.5rem 6rem;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.4rem;
  }
  .photo-tile{
    position:relative;
    height: 200px;
    cursor:pointer;
    border: 1px solid rgba(228,196,104,0.2);
  }
  .photo-tile .tile-inner{ position:absolute; inset:0; overflow:hidden; }
  .photo-tile .frame-bg{
    position:absolute; inset:0;
    background: linear-gradient(145deg, #3a3a3a, #1d1d1d 45%, #565656 75%);
    filter: sepia(0.2) contrast(1.05);
    display:flex; align-items:center; justify-content:center;
    font-size:2.2rem;
    transition: transform 0.4s ease;
  }
  .photo-tile:hover .frame-bg{ transform: scale(1.08); }
  .photo-tile .label{
    position:absolute; bottom:0; left:0; right:0;
    background: linear-gradient(to top, rgba(28,19,16,0.9), transparent);
    padding: 0.8rem;
    font-size:0.85rem;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox{
    position:fixed; inset:0;
    background: rgba(28,19,16,0.93);
    display:none;
    align-items:center; justify-content:center;
    z-index: 200;
    padding: 2rem;
  }
  .lightbox.active{ display:flex; }
  .lightbox-inner{ max-width: 720px; width:100%; text-align:center; position:relative; }
  .lightbox .frame-bg{
    width:100%; height: 60vh; max-height:520px;
    background: linear-gradient(145deg, #3a3a3a, #1d1d1d 45%, #565656 75%);
    filter: sepia(0.2) contrast(1.05);
    display:flex; align-items:center; justify-content:center;
    font-size:4rem;
    border: 1px solid var(--gold-soft);
  }
  .lightbox .lb-title{ margin-top:1.2rem; font-size:1.5rem; }
  .lightbox .lb-close{
    position:absolute; top: 2rem; right:2rem;
    background:none; border:1px solid var(--gold-soft); color: var(--gold-soft);
    width:42px; height:42px; border-radius:50%; font-size:1.2rem; cursor:pointer;
  }
  .lightbox .lb-close:hover{ background: var(--gold-soft); color: var(--ink); }

  @media (max-width: 720px){
    .navbar{ flex-direction:column; gap:1rem; align-items:flex-start; }
    .navbar nav{ gap:1.2rem; flex-wrap:wrap; }
    .scatter-item{ width: 85vw !important; height: auto !important; aspect-ratio: 4/5; }
  }

  @media (prefers-reduced-motion: reduce){
    .scatter-item, .photo-tile .frame-bg{ transition:none; }
  }
</style>
</head>
<body>

  <div class="view active" id="view-home">
    <header class="navbar">
      <div class="brand">Elijah Che Williams</div>
      <nav>
        <a href="#" data-link="images">Images</a>
        <a href="#" data-link="moving">Moving Images</a>
        <a href="#" data-link="deeper">A Deeper Look</a>
      </nav>
    </header>

    <div class="scatter-wrap">
      <div class="scatter-grid" id="scatter-grid"></div>
    </div>
  </div>

  <div class="view" id="view-overview">
    <div class="overview-header">
      <button class="back-btn" id="back-btn">← Back</button>
      <h2 id="overview-title">Series</h2>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <div class="lightbox-inner">
      <div class="frame-bg" id="lb-frame"></div>
      <p class="lb-title" id="lb-title"></p>
    </div>
  </div>

<script>
  /* Each entry = one item shown scattered on the home page.
     type: "photo" or "video"
     size: sm | md | lg | tall | wide
     tape: which corner/edge the tape sits on
     photos: sub-gallery shown when clicked (for photo series) */
  const items = [
    {
      id: "purple-wall",
      type: "photo",
      icon: "🏚️",
      title: "Purple Wall Stillness",
      size: "tall",
      tape: "pos-tl",
      photos: [
        { title: "Purple Wall Stillness", icon: "🏚️" },
        { title: "Window Light", icon: "🪟" },
        { title: "AC Unit Study", icon: "❄️" }
      ]
    },
    {
      id: "blue-wall-video",
      type: "video",
      icon: "🎬",
      title: "Blue Wall (Moving Image)",
      size: "wide",
      tape: "pos-tr",
      photos: [
        { title: "Blue Wall (Moving Image)", icon: "🎬" }
      ]
    },
    {
      id: "blue-skirt",
      type: "photo",
      icon: "👗",
      title: "Blue Skirt, Faded Brick",
      size: "lg",
      tape: "pos-tr",
      photos: [
        { title: "Blue Skirt, Faded Brick", icon: "👗" },
        { title: "Sock Detail", icon: "🧦" },
        { title: "Sweater Texture", icon: "🧶" }
      ]
    },
    {
      id: "two-sisters",
      type: "photo",
      icon: "🌾",
      title: "Two Sisters, Golden Field",
      size: "md",
      tape: "pos-bl",
      photos: [
        { title: "Two Sisters, Golden Field", icon: "🌾" },
        { title: "Wind in the Grass", icon: "🍃" }
      ]
    },
    {
      id: "sky-figure",
      type: "photo",
      icon: "☁️",
      title: "Sky, Reaching",
      size: "tall",
      tape: "pos-midleft",
      photos: [
        { title: "Sky, Reaching", icon: "☁️" },
        { title: "Cloud Study", icon: "🌥️" }
      ]
    },
    {
      id: "bare-trees",
      type: "photo",
      icon: "🌳",
      title: "Bare Trees, Winter",
      size: "wide",
      tape: "pos-bl",
      photos: [
        { title: "Bare Trees, Winter", icon: "🌳" }
      ]
    }
  ];

  const grid = document.getElementById('scatter-grid');
  const viewHome = document.getElementById('view-home');
  const viewOverview = document.getElementById('view-overview');
  const overviewTitle = document.getElementById('overview-title');
  const photoGrid = document.getElementById('photo-grid');
  const backBtn = document.getElementById('back-btn');
  const lightbox = document.getElementById('lightbox');
  const lbFrame = document.getElementById('lb-frame');
  const lbTitle = document.getElementById('lb-title');
  const lbClose = document.getElementById('lb-close');

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = `scatter-item size-${item.size} ${item.type === 'video' ? 'is-video' : ''}`;
    el.innerHTML = `
      <div class="tape ${item.tape}"></div>
      <div class="media">
        ${item.type === 'video'
          ? `<div class="play-btn">▶</div>`
          : `<div class="frame-icon">${item.icon}</div>`}
      </div>
      <span class="title-tag">${item.title}</span>
    `;
    el.addEventListener('click', () => openSeries(item.id));
    grid.appendChild(el);
  });

  const scatterEls = document.querySelectorAll('.scatter-item');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('in-view');
    });
  }, { threshold: 0.15 });
  scatterEls.forEach((el, i) => setTimeout(() => observer.observe(el), i * 70));

  function openSeries(id){
    const item = items.find(x => x.id === id);
    if (!item) return;
    overviewTitle.textContent = item.title;
    photoGrid.innerHTML = '';
    item.photos.forEach((p, i) => {
      const tile = document.createElement('div');
      tile.className = 'photo-tile';
      tile.innerHTML = `
        <div class="tile-inner">
          <div class="frame-bg">${p.icon}</div>
          <div class="label">${p.title}</div>
        </div>
      `;
      tile.addEventListener('click', () => openLightbox(p));
      photoGrid.appendChild(tile);
    });
    viewHome.classList.remove('active');
    viewOverview.classList.add('active');
    window.scrollTo({top:0, behavior:'instant'});
  }

  backBtn.addEventListener('click', () => {
    viewOverview.classList.remove('active');
    viewHome.classList.add('active');
    window.scrollTo({top:0, behavior:'instant'});
  });

  function openLightbox(photo){
    lbFrame.textContent = photo.icon;
    lbTitle.textContent = photo.title;
    lightbox.classList.add('active');
  }
  lbClose.addEventListener('click', () => lightbox.classList.remove('active'));
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('active'); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('active'); });
</script>
</body>
</html>
